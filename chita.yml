services:
    agentbeats-finance:
        name: agentbeats-finance
        hosts:
            - agentbeats-finance.chitacloud.dev
        port: 8080
        ttl: 14400
        memory: 1024
        cpu: 0.25
        dockerfile: Dockerfile
        docker_context: .
        handler: Handle
        public_invoke: true
        files:
            - Dockerfile
            - agent.py
            - server.py
            - requirements.txt
            - officeqa_lookup.py
        env:
            OPENAI_MODEL: gpt-4o-mini
            LLM_PROVIDER: openai
        working_directory: /app/data/agentbeats-finance
