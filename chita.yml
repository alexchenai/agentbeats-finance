services:
    agentbeats-finance:
        name: agentbeats-finance
        hosts:
            - agentbeats-finance.chitacloud.dev
        port: 8080
        ttl: 14400
        memory: 512
        cpu: 0.25
        dockerfile: Dockerfile
        docker_context: .
        handler: Handle
        public_invoke: true
        files:
            - Dockerfile
            - agent.py
            - server.py
            - requirements.txt
        working_directory: /app/data/agentbeats-finance
